services:
  prefect-server:
    image: prefecthq/prefect:3-python3.12
    command: prefect server start --host 0.0.0.0
    ports:
      - "4200:4200"
    volumes:
      - prefect-data:/root/.prefect

  minio-init:
    image: quay.io/minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    restart: "no"
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${MINIO_ACCESS_KEY:-minioadmin} ${MINIO_SECRET_KEY:-minioadmin} &&
      mc mb --ignore-existing local/${MINIO_SOURCE_BUCKET:-source} &&
      mc mb --ignore-existing local/${MINIO_SINK_BUCKET:-sink}
      "

  minio-etl:
    build:
      context: .
      dockerfile: Dockerfile
    profiles:
      - manual
    depends_on:
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    environment:
      MINIO_ENDPOINT: minio:9000
      MINIO_SOURCE_BUCKET: ${MINIO_SOURCE_BUCKET:-source}
      MINIO_SINK_BUCKET: ${MINIO_SINK_BUCKET:-sink}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      MINIO_SECURE: "false"
    volumes:
      - ./log:/app/log
      - model-cache:/root/.cache
    command:
      [
        "minio-etl",
        "--source-bucket",
        "${MINIO_SOURCE_BUCKET:-source}",
        "--endpoint",
        "minio:9000",
        "--bucket",
        "${MINIO_SINK_BUCKET:-sink}",
        "--access-key",
        "${MINIO_ACCESS_KEY:-minioadmin}",
        "--secret-key",
        "${MINIO_SECRET_KEY:-minioadmin}"
      ]

  minio-worker:
    build:
      context: .
      dockerfile: Dockerfile
    profiles:
      - legacy
    restart: unless-stopped
    depends_on:
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    environment:
      MINIO_ENDPOINT: minio:9000
      MINIO_SOURCE_BUCKET: ${MINIO_SOURCE_BUCKET:-source}
      MINIO_SINK_BUCKET: ${MINIO_SINK_BUCKET:-sink}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      MINIO_SECURE: "false"
    volumes:
      - ./log:/app/log
      - model-cache:/root/.cache
    command:
      [
        "minio-etl",
        "--worker",
        "--source-bucket",
        "${MINIO_SOURCE_BUCKET:-source}",
        "--endpoint",
        "minio:9000",
        "--bucket",
        "${MINIO_SINK_BUCKET:-sink}",
        "--access-key",
        "${MINIO_ACCESS_KEY:-minioadmin}",
        "--secret-key",
        "${MINIO_SECRET_KEY:-minioadmin}"
      ]

  prefect-etl:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
      prefect-server:
        condition: service_started
    environment:
      PREFECT_API_URL: http://prefect-server:4200/api
      PREFECT_UI_URL: http://localhost:4200
      PREFECT_DEPLOYMENT_NAME: ${PREFECT_DEPLOYMENT_NAME:-minio-document-etl}
      PREFECT_ETL_INTERVAL_SECONDS: ${PREFECT_ETL_INTERVAL_SECONDS:-10}
      MINIO_ENDPOINT: minio:9000
      MINIO_SOURCE_BUCKET: ${MINIO_SOURCE_BUCKET:-source}
      MINIO_SINK_BUCKET: ${MINIO_SINK_BUCKET:-sink}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      MINIO_SECURE: "false"
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    volumes:
      - ./log:/app/log
      - model-cache:/root/.cache
    command: ["prefect-etl-serve"]

  minio:
    image: quay.io/minio/minio:latest
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 12

volumes:
  minio-data:
  model-cache:
  prefect-data:
